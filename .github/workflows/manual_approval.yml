name: Production Deployment

on:
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production  # requires a reviewer configured in GitHub repo settings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Fly CLI
        id: cache-fly
        uses: actions/cache@v4
        with:
          path: ~/.fly/bin
          key: fly-cli-${{ runner.os }}

      - name: Install Fly CLI
        if: steps.cache-fly.outputs.cache-hit != 'true'
        run: |
          curl -L https://fly.io/install.sh | sh

      - name: Add Fly CLI to PATH
        run: echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Deploy to Production
        run: fly deploy --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
